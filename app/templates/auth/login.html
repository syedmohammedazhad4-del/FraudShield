{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card card-custom shadow-sm">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-indigo-subtle mb-3" style="width: 56px; height: 56px;">
                            <i class="bi bi-shield-lock fs-4 text-indigo"></i>
                        </div>
                        <h4 class="fw-bold text-slate-800 mb-1">Welcome Back</h4>
                        <p class="text-muted small">Sign in to your account</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                        {{ form.hidden_tag() }}

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold text-slate-700">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0 {% if form.username.errors %}is-invalid{% endif %}" id="username" name="username" placeholder="Enter your username" value="{{ form.username.data or '' }}">
                            </div>
                            {% for error in form.username.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                            {% endfor %}
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold text-slate-700">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 {% if form.password.errors %}is-invalid{% endif %}" id="password" name="password" placeholder="Enter your password">
                            </div>
                            {% for error in form.password.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                            {% endfor %}
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-muted small mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-indigo fw-semibold text-decoration-none">Register</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
